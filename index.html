<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

     <h1 class="titulo">Mi Calculadora</h1>
    <div id="calculadora">
        <input type="text" id="valor1" placeholder="Número 1" class="texto">
        <input type="text" id="valor2" placeholder="Número 2" class="texto">
        <br>
        <br>
        <div id="botones">
            <input type="button" value="sumar" onclick="suma()" class="boton">
            <input type="button" value="restar" onclick="resta()" class="boton">
            <input type="button" value="multiplicar" onclick="multiplicacion()" class="boton">
            <input type="button" value="dividir" onclick="division()" class="boton">
        </div>
        <br>
        <br>
        <h2 class="titulo">Resultado</h2>
        <div id="resultado">0</div>
    </div>

    <script src="index.js"></script>
    
</body>
</html>
